# Serves the static test site in /docs (e.g. https://nellcodx.github.io/reservation/)
# First time: Settings → Pages → Build: GitHub Actions (pick this workflow if prompted)
name: Publish GitHub Pages preview
on:
  push:
    branches: [main]
    paths: ["docs/**", ".github/workflows/github-pages.yml"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Do not cancel a deploy in progress; matches GitHub’s static Pages template
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
